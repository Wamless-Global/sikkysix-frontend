<!DOCTYPE html>
<html lang="en" style="margin: 0; padding: 0">
	<head>
		<meta charset="UTF-8" />
		<meta name="color-scheme" content="light dark" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Your Magic Link</title>
		<link href="https://fonts.googleapis.com/css?family=Montserrat:400,600&display=swap" rel="stylesheet" />
		<style>
			body {
				background: #18181b;
				color: #f4f4f5;
				font-family: 'Montserrat', 'Inter', Arial, sans-serif;
				margin: 0;
				padding: 0;
			}
			.container {
				max-width: 420px;
				margin: 40px auto;
				background: #232329;
				border-radius: 16px;
				box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
				padding: 32px 24px;
				text-align: center;
			}
			.logo {
				font-size: 2rem;
				font-weight: bold;
				margin-bottom: 24px;
				color: #22c55e;
				letter-spacing: 2px;
			}
			h1 {
				font-size: 1.5rem;
				margin: 0 0 12px 0;
				font-weight: 600;
				color: #d4d4d8;
			}
			p {
				color: #d4d4d8;
				font-size: 1rem;
				margin: 0 0 24px 0;
			}
			.button {
				display: inline-block;
				background: #22c55e;
				color: #fff;
				text-decoration: none;
				padding: 12px 32px;
				border-radius: 8px;
				font-weight: 600;
				font-size: 1rem;
				margin-bottom: 24px;
				transition: background 0.2s;
			}
			.button:hover {
				background: #16a34a;
			}
			.footer {
				color: #a1a1aa;
				font-size: 0.9rem;
				margin-top: 32px;
			}
			@media (max-width: 500px) {
				.container {
					padding: 20px 8px;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="logo">
				<img src="https://sikkysix.com/images/dark-full-logo.png" alt="logo" style="width: 100px; height: auto" />
			</div>
			<h1>Magic Link</h1>
			<p>Follow this link to login:</p>
			<a href="{{ .ConfirmationURL }}" class="button">Log In</a>
			<div class="footer">Need help? <a href="mailto:support@sikkysix.com" style="color: #22c55e; text-decoration: underline">Contact support</a></div>
		</div>
	</body>
</html>
